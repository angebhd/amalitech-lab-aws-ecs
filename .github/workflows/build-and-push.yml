name: Build and push image to ECR

# Pushing application code builds a container image, tags it immutably with the
# commit SHA, and pushes it to ECR. The push is what EventBridge uses to trigger
# CodePipeline -> CodeDeploy (blue/green). The deploy bundle (taskdef + appspec)
# is rendered here with the exact image URI so the pipeline deploys precisely
# this immutable image -- no mutable "latest" tag is ever moved.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle"
      - "settings.gradle"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}

# OIDC: request a short-lived token to assume the AWS role. No static keys.
permissions:
  id-token: write
  contents: read

env:
  ARTIFACT_BUCKET: ecs-cicd-artifacts # <account>-<region> suffix appended below

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Look up the real task role ARNs from the running service
        id: roles
        run: |
          # The roles are auto-named by CloudFormation; read their real ARNs from
          # the service's current task definition so taskdef.json points at roles
          # that actually exist.
          TD=$(aws ecs describe-services --cluster ecs-cicd-cluster --services ecs-cicd-service \
                 --query 'services[0].taskDefinition' --output text)
          echo "exec=$(aws ecs describe-task-definition --task-definition "$TD" \
                 --query 'taskDefinition.executionRoleArn' --output text)" >> "$GITHUB_OUTPUT"
          echo "task=$(aws ecs describe-task-definition --task-definition "$TD" \
                 --query 'taskDefinition.taskRoleArn' --output text)" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ange_buhendwa_${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
# NO need to inject arn, and to push everytime to S3 | Use parameter 
      - name: Render deploy bundle (taskdef + appspec)
        id: render
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          EXEC_ROLE_ARN: ${{ steps.roles.outputs.exec }}
          TASK_ROLE_ARN: ${{ steps.roles.outputs.task }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          sed -e "s|__IMAGE_URI__|${IMAGE_URI}|g" \
              -e "s|__EXEC_ROLE_ARN__|${EXEC_ROLE_ARN}|g" \
              -e "s|__TASK_ROLE_ARN__|${TASK_ROLE_ARN}|g" \
              -e "s|__AWS_REGION__|${AWS_REGION}|g" \
              deploy/taskdef.json > taskdef.json
          cp deploy/appspec.yaml appspec.yaml
          zip -j config-source.zip taskdef.json appspec.yaml
          echo "bucket=${ARTIFACT_BUCKET}-${ACCOUNT_ID}-${AWS_REGION}" >> "$GITHUB_OUTPUT"

      - name: Upload deploy bundle to the artifact bucket
        env:
          BUCKET: ${{ steps.render.outputs.bucket }}
        run: |
          # Upload the bundle BEFORE pushing the image, so the pipeline (started
          # by the ECR push event) reads config that already points at this SHA.
          aws s3 cp config-source.zip "s3://${BUCKET}/config-source.zip"

      - name: Push image to ECR (skip if the immutable tag already exists)
        id: push
        env:
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ange_buhendwa_${{ github.sha }}
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          set +e
          OUT=$(aws ecr describe-images --repository-name "$REPOSITORY" \
                  --image-ids imageTag="$IMAGE_TAG" 2>&1)
          RC=$?
          set -e
          if [ "$RC" -eq 0 ]; then
            echo "Image $IMAGE_TAG already exists (re-run) — skipping push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          elif echo "$OUT" | grep -q 'ImageNotFoundException'; then
            docker push "$IMAGE_URI"
            echo "Pushed immutable image: $IMAGE_URI"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            # Any other error (e.g. AccessDenied) is real — fail loudly instead
            # of mistaking it for "image not found" and pushing.
            echo "$OUT" >&2
            exit 1
          fi

      - name: Trigger the pipeline directly on a re-run
        if: steps.push.outputs.pushed == 'false'
        run: |
          # On a re-run no ECR push event fires, so start the pipeline explicitly.
          # It reads the freshly-uploaded config-source.zip (now with correct roles).
          aws codepipeline start-pipeline-execution --name ecs-cicd-pipeline
